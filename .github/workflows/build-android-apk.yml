name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.6.0)'
        required: false
        default: 'dev'
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - '**.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  APK_VERSION_NAME: ${{ github.event.inputs.version || 'dev' }}

jobs:
  check:
    name: Validate Android build targets
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check_rust.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: >
            aarch64-linux-android,
            armv7-linux-androideabi,
            x86_64-linux-android,
            i686-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          key: android-check

      - name: Check Rust compilation for Android targets
        id: check_rust
        run: |
          # Check if the project can compile as a lib for Android
          # We use --check to validate compilation without producing artifacts
          echo "Checking Android targets..."
          for target in aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android; do
            echo "  Checking $target..."
            if cargo check --target "$target" 2>/dev/null; then
              echo "    ✅ $target compiles"
            else
              echo "    ⚠️  $target needs adaptation - will cross-compile with NDK"
            fi
          done
          echo "should_build=true" >> "$GITHUB_OUTPUT"

  build-native:
    name: Build native .so for Android
    needs: check
    runs-on: ubuntu-latest
    if: needs.check.outputs.should_build == 'true'
    strategy:
      matrix:
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
            api: 26
          - target: armv7-linux-androideabi
            abi: armeabi-v7a
            api: 26
          - target: x86_64-linux-android
            abi: x86_64
            api: 26
          - target: i686-linux-android
            abi: x86
            api: 26

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: android-${{ matrix.target }}

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b
          add-to-path: false

      - name: Build native library with cargo-ndk
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cargo ndk \
            --target ${{ matrix.target }} \
            --platform ${{ matrix.api }} \
            -- build --release

      - name: Copy .so to jniLibs
        run: |
          mkdir -p android/app/src/main/jniLibs/${{ matrix.abi }}
          find target/${{ matrix.target }}/release -name "*.so" -exec cp {} android/app/src/main/jniLibs/${{ matrix.abi }}/ \;
          echo "Copied .so files for ${{ matrix.abi }}:"
          ls -la android/app/src/main/jniLibs/${{ matrix.abi }}/

      - name: Upload native lib artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-lib-${{ matrix.abi }}
          path: android/app/src/main/jniLibs/${{ matrix.abi }}/
          retention-days: 1

  package-apk:
    name: Package Android APK
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download all native libs
        uses: actions/download-artifact@v4
        with:
          path: native-libs
          pattern: native-lib-*
          merge-multiple: true

      - name: Copy native libs to project
        run: |
          mkdir -p android/app/src/main/jniLibs
          cp -r native-libs/* android/app/src/main/jniLibs/
          echo "=== jniLibs structure ==="
          find android/app/src/main/jniLibs -type f | sort
          echo "=== File sizes ==="
          find android/app/src/main/jniLibs -type f -exec ls -lh {} \;

      - name: Create Gradle wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.5
          ls -la gradlew

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
          echo "=== APK output ==="
          find . -name "*.apk" -type f | head -10

      - name: Build release APK (unsigned)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: UAD-GUI-Android-${{ github.sha }}
          path: |
            android/app/build/outputs/apk/**/*.apk
          retention-days: 30

  sign-and-release:
    name: Sign and release APK
    needs: package-apk
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download unsigned APK
        uses: actions/download-artifact@v4
        with:
          path: apk-artifacts
          pattern: UAD-GUI-Android-*
          merge-multiple: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Sign APK
        env:
          SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
          SIGNING_ALIAS: ${{ secrets.ANDROID_SIGNING_ALIAS }}
          SIGNING_PASSWORD: ${{ secrets.ANDROID_SIGNING_PASSWORD }}
        run: |
          if [ -z "$SIGNING_KEY" ]; then
            echo "⚠️  No signing key found - creating unsigned release"
            mkdir -p signed
            find apk-artifacts -name "*.apk" -exec cp {} signed/ \;
          else
            echo "$SIGNING_KEY" | base64 -d > signing-key.jks
            find apk-artifacts -name "*.apk" | while read apk; do
              basename=$(basename "$apk" .apk)
              cp "$apk" "signed/${basename}-unsigned.apk"
              apksigner sign \
                --ks signing-key.jks \
                --ks-key-alias "$SIGNING_ALIAS" \
                --ks-pass pass:"$SIGNING_PASSWORD" \
                --out "signed/${basename}.apk" \
                "$apk"
            done
            rm -f signing-key.jks
          fi
          ls -la signed/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ github.workspace }}/CHANGELOG.md
          files: signed/*.apk
          prerelease: true
          fail_on_unmatched_files: false
